<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#163a5f">
  <meta name="description" content="夏休みの宿題を冒険クエストに変える、親子向け宿題管理ツール">
  <title>サマログ！クエスト｜夏休み宿題管理</title>
  <style>
    :root{--navy:#123356;--sky:#dff5ff;--blue:#218ad4;--ink:#17324d;--cream:#fffaf0;--gold:#ffc52f;--orange:#ff7a24;--green:#34b36b;--red:#ef5350;--purple:#7d59cf;--panel:#fff;--line:#c7ddea;--shadow:0 12px 0 rgba(19,70,103,.12),0 22px 45px rgba(28,91,132,.16)}
    *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;color:var(--ink);font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;background:radial-gradient(circle at 15% 8%,#fff 0 8%,transparent 22%),linear-gradient(180deg,#d9f5ff 0,#fff8df 56%,#eaf9d8 100%);min-height:100vh}button,input,select{font:inherit}button{cursor:pointer}.skip{position:fixed;left:12px;top:-80px;z-index:99;background:#fff;padding:12px}.skip:focus{top:12px}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px clamp(14px,4vw,44px);background:rgba(18,51,86,.94);backdrop-filter:blur(14px);color:#fff;border-bottom:4px solid var(--gold)}.brand{display:flex;align-items:center;gap:9px;font-weight:900}.brand-gem{width:31px;height:31px;display:grid;place-items:center;background:linear-gradient(135deg,#71e8ff,#177cca);border:3px solid #fff;transform:rotate(45deg);border-radius:7px;box-shadow:0 0 0 3px #f9ba27}.brand-gem span{transform:rotate(-45deg)}.mode-switch{display:flex;background:#0a2540;padding:4px;border-radius:99px}.mode-switch button{min-height:44px;border:0;border-radius:99px;color:#d5edff;background:transparent;padding:0 16px;font-weight:900}.mode-switch button.active{background:var(--gold);color:#4b3300;box-shadow:inset 0 -3px 0 #d88f00}.shell{width:min(1180px,calc(100% - 28px));margin:0 auto 70px}.hero{padding:24px 0 8px;text-align:center}.hero img{display:block;width:min(650px,95%);max-height:145px;object-fit:contain;margin:auto;mix-blend-mode:multiply}.hero p{font-weight:800;margin:0;color:#315979}.view{display:none}.view.active{display:block}.game-grid{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(280px,.65fr);gap:20px;align-items:start}.panel{background:rgba(255,255,255,.93);border:3px solid #fff;border-radius:26px;box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden}.panel:before{content:"";position:absolute;inset:0;pointer-events:none;border:2px solid rgba(48,130,179,.15);border-radius:23px}.arena{min-height:540px;background:linear-gradient(180deg,#75d9ff 0 44%,#b8e87a 44% 58%,#6ca64a 58%);isolation:isolate;padding:18px}.arena:after{content:"";position:absolute;inset:44% 0 0;background:repeating-linear-gradient(115deg,transparent 0 28px,rgba(44,97,43,.08) 29px 31px);z-index:-1}.arena-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.badge{display:inline-flex;align-items:center;min-height:36px;border-radius:99px;background:#fff;color:#1e5b84;padding:6px 12px;font-weight:900;border:2px solid #6dbde6}.stage{position:relative;display:grid;grid-template-columns:1fr 1fr;align-items:end;min-height:315px;padding-top:25px}.enemy,.treasure{text-align:center;position:relative}.enemy img{width:min(300px,95%);height:250px;object-fit:contain;mix-blend-mode:multiply;filter:drop-shadow(0 18px 8px rgba(37,72,54,.24));transition:.35s}.enemy.hit img{animation:hit .45s ease}.enemy.defeated img{filter:grayscale(1) opacity(.35);transform:rotate(9deg) translateY(20px)}@keyframes hit{25%{transform:translateX(-18px) rotate(-6deg)}55%{transform:translateX(15px) rotate(5deg);filter:brightness(1.8) sepia(1) saturate(5)}}.treasure img{width:min(245px,95%);height:220px;object-fit:contain;mix-blend-mode:multiply;filter:drop-shadow(0 15px 8px rgba(74,55,20,.22));transition:.6s}.treasure.won img{animation:treasure 1.2s ease infinite alternate}@keyframes treasure{to{transform:translateY(-8px) scale(1.035);filter:drop-shadow(0 0 22px #fff3a0)}}.nameplate{display:inline-block;background:#17324d;color:#fff;border:3px solid #fff;border-radius:10px;padding:7px 14px;font-weight:900;box-shadow:0 4px 0 #0a233a}.hp{max-width:290px;margin:7px auto;background:#5c2630;border:3px solid #fff;border-radius:99px;height:22px;overflow:hidden}.hp>i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#41d87b,#9cf054);transition:.5s}.battle-message{background:rgba(12,37,61,.91);color:#fff;border:3px solid #fff;border-radius:16px;min-height:64px;padding:12px 16px;font-size:clamp(14px,2vw,18px);font-weight:900;box-shadow:0 5px 0 rgba(0,0,0,.2)}.progress-row{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;margin:14px 0 0}.bar{height:18px;background:#d6e4eb;border-radius:99px;overflow:hidden;box-shadow:inset 0 2px 5px rgba(0,0,0,.14)}.bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--orange),var(--gold));transition:.55s}.side-stack{display:grid;gap:20px}.section-title{display:flex;align-items:center;gap:10px;margin:0 0 15px;font-size:21px}.section-title span{width:38px;height:38px;display:grid;place-items:center;border-radius:12px;background:#e5f6ff}.inventory{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.item{position:relative;border:2px solid #d5e4ec;border-radius:16px;background:#f7fbfd;padding:7px;text-align:center;min-height:116px}.item img{width:100%;height:74px;object-fit:contain;mix-blend-mode:multiply}.item strong{position:absolute;right:6px;top:6px;background:#17324d;color:white;border:2px solid white;border-radius:99px;min-width:28px;padding:2px}.quest-list{display:grid;gap:12px}.quest{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:13px;background:#fff;border:2px solid #d7e7ef;border-radius:17px;box-shadow:0 5px 0 rgba(24,80,112,.08)}.quest.done{background:#effcf2;border-color:#82dca1}.quest-icon{width:48px;height:48px;display:grid;place-items:center;border-radius:14px;font-size:24px;background:#fff0c8}.quest h3{font-size:16px;margin:0 0 3px}.quest p{margin:0;font-size:13px;color:#62798a}.primary,.secondary,.danger,.attack{border:0;min-height:44px;border-radius:13px;padding:9px 15px;font-weight:900;box-shadow:inset 0 -4px 0 rgba(0,0,0,.16);transition:.15s}.primary{background:var(--blue);color:white}.secondary{background:#e9f4fa;color:#255372}.danger{background:#ffe4e3;color:#a92828}.attack{width:100%;background:linear-gradient(180deg,#ffda3d,#f79919);color:#593500;font-size:18px;margin-top:12px}.primary:hover,.attack:hover{transform:translateY(-2px)}button:focus-visible,input:focus-visible,select:focus-visible{outline:4px solid #9b64ff;outline-offset:2px}.empty{text-align:center;color:#6c8291;padding:24px}.parent-grid{display:grid;grid-template-columns:.85fr 1.15fr;gap:20px}.form-grid{display:grid;gap:12px}.field{display:grid;gap:6px}.field label{font-weight:900;font-size:13px;color:#315a77}.field input,.field select{width:100%;min-height:46px;border:2px solid #bdd6e4;border-radius:12px;background:#fff;padding:9px 12px;color:var(--ink)}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.work-card{padding:14px;border-radius:16px;background:#f5fbff;border:2px solid #d3e7f2;margin-bottom:10px}.work-head{display:flex;justify-content:space-between;gap:10px;align-items:center}.work-head h3{margin:0;font-size:16px}.mini{font-size:12px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.stat{padding:13px;border-radius:16px;text-align:center;background:#fff7da;border:2px solid #f6d46e}.stat strong{display:block;font-size:24px;color:#97510b}.notice{background:#fff4c5;border:2px solid #f1c145;border-radius:15px;padding:12px;font-size:13px;line-height:1.7}.toast{position:fixed;left:50%;bottom:24px;z-index:50;transform:translate(-50%,120px);background:#183550;color:white;border:3px solid white;border-radius:16px;padding:13px 20px;font-weight:900;box-shadow:0 12px 30px #0005;transition:.35s}.toast.show{transform:translate(-50%,0)}dialog{border:0;border-radius:22px;width:min(92vw,420px);box-shadow:0 30px 80px #142d4977;padding:24px}dialog::backdrop{background:#102b4388;backdrop-filter:blur(4px)}dialog h2{margin-top:0}.dialog-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}.confetti{position:fixed;inset:0;pointer-events:none;z-index:60;overflow:hidden}.confetti i{position:absolute;top:-30px;width:13px;height:21px;animation:fall 2.8s linear forwards}@keyframes fall{to{transform:translate(var(--drift),110vh) rotate(780deg)}}
    @media(max-width:820px){.game-grid,.parent-grid{grid-template-columns:1fr}.arena{min-height:490px}.stage{min-height:280px}.enemy img{height:210px}.treasure img{height:180px}.topbar{align-items:flex-start}.brand{font-size:14px}.mode-switch button{padding:0 11px}.stats{grid-template-columns:1fr 1fr}.stats .stat:last-child{grid-column:1/-1}}
    @media(max-width:520px){.shell{width:min(100% - 16px,1180px)}.hero{padding-top:12px}.hero img{height:88px}.panel{padding:14px;border-radius:20px}.arena{padding:12px}.stage{grid-template-columns:1.15fr .85fr;min-height:245px}.enemy img{height:175px}.treasure img{height:145px}.nameplate{font-size:12px;padding:5px 8px}.quest{grid-template-columns:auto 1fr}.quest button{grid-column:1/-1;width:100%}.two{grid-template-columns:1fr}.inventory{grid-template-columns:repeat(3,1fr)}.item{min-height:96px}.item img{height:57px}}
    @media(prefers-reduced-motion:reduce){*,*:before,*:after{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
  </style>
  <link rel="stylesheet" href="summer-quest-v2.css">
</head>
<body>
<a class="skip" href="#main">内容へスキップ</a>
<header class="topbar"><div class="brand"><span class="brand-gem"><span>✦</span></span>サマログ！クエスト</div><nav class="mode-switch" aria-label="画面切り替え"><button id="kidModeBtn" class="active" aria-pressed="true">⚔ キッズ</button><button id="parentModeBtn" aria-pressed="false">⚙ 保護者</button></nav></header>
<main id="main" class="shell">
  <section class="hero" aria-labelledby="app-title"><h1 id="app-title" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">サマログ！クエスト</h1><img src="assets/logo.webp" alt="サマログ！forキッズ"><p>宿題をクリアして、宝箱をとりもどそう！</p></section>
  <section id="kidView" class="view active" aria-label="キッズ画面">
    <div class="game-grid">
      <section class="panel arena" aria-labelledby="battleTitle"><div class="arena-head"><h2 id="battleTitle" class="section-title" style="margin:0"><span>⚔</span>宝箱バトル</h2><div class="badge" id="stageBadge">ステージ 1</div></div><div class="stage"><div class="enemy" id="enemy"><div class="nameplate" id="enemyName">ぷるぷるスライム</div><div class="hp" aria-label="敵の体力"><i id="hpBar"></i></div><img id="enemyImg" src="assets/monster-slime.webp" alt="宝箱を守るモンスター"></div><div class="treasure" id="treasure"><img id="chestImg" src="assets/chest-locked.webp" alt="敵に守られている宝箱"><div class="nameplate" id="chestLabel">カギのかかった宝箱</div></div></div><div class="battle-message" id="battleMessage" aria-live="polite">クエストを達成して、攻撃アイテムを手に入れよう！</div><div class="progress-row"><b>冒険</b><div class="bar"><i id="questBar"></i></div><strong id="questProgress">0 / 0</strong></div></section>
      <aside class="side-stack"><section class="panel"><h2 class="section-title"><span>🎒</span>もちもの</h2><div class="inventory" id="inventory"></div><button class="attack" id="attackBtn">⚔ アイテムで攻撃！</button></section><section class="panel"><h2 class="section-title"><span>🏅</span>冒険のきろく</h2><div class="stats"><div class="stat"><small>達成</small><strong id="doneStat">0</strong></div><div class="stat"><small>撃破</small><strong id="killStat">0</strong></div><div class="stat"><small>宝箱</small><strong id="chestStat">0</strong></div></div><div class="notice" id="nextHint">まずはクエストを1つ達成しよう。</div></section></aside>
    </div>
    <section class="panel" style="margin-top:20px"><h2 class="section-title"><span>📜</span>今日のクエスト</h2><div class="quest-list" id="kidQuestList"></div></section>
  </section>
  <section id="parentView" class="view" aria-label="保護者画面">
    <div class="parent-grid"><div class="side-stack"><section class="panel"><h2 class="section-title"><span>👤</span>冒険者の設定</h2><div class="form-grid"><div class="field"><label for="childName">お子さまの名前</label><input id="childName" maxlength="12" placeholder="ゆうき"></div><div class="field"><label for="pinInput">保護者PIN（4桁・任意）</label><input id="pinInput" inputmode="numeric" maxlength="4" placeholder="未設定"></div><button class="primary" id="saveProfileBtn">設定を保存</button></div></section><section class="panel"><h2 class="section-title"><span>📚</span>ワークを登録</h2><form id="workForm" class="form-grid"><div class="field"><label for="workName">ワーク名</label><input id="workName" required placeholder="算数ドリル"></div><div class="two"><div class="field"><label for="totalPages">全ページ数</label><input id="totalPages" required type="number" min="1" value="40"></div><div class="field"><label for="dailyPages">1日の目標</label><input id="dailyPages" required type="number" min="1" value="5"></div></div><button class="primary" type="submit">＋ ワークを追加</button></form></section></div><div class="side-stack"><section class="panel"><h2 class="section-title"><span>✨</span>任意クエストを追加</h2><form id="questForm" class="form-grid"><div class="field"><label for="questTitle">クエスト名</label><input id="questTitle" required placeholder="お皿を片づける"></div><div class="two"><div class="field"><label for="questType">種類</label><select id="questType"><option value="help">お手伝い</option><option value="study">勉強</option><option value="life">生活</option><option value="free">その他</option></select></div><div class="field"><label for="reward">ごほうびアイテム</label><select id="reward"><option value="sword">銀のつるぎ</option><option value="wand">星のつえ</option><option value="shield">勇者のたて</option><option value="key">黄金のカギ</option><option value="potion">赤いポーション</option></select></div></div><button class="primary" type="submit">＋ クエストを追加</button></form></section><section class="panel"><h2 class="section-title"><span>🗂</span>登録内容</h2><div id="parentList"></div></section><section class="panel"><h2 class="section-title"><span>🔧</span>データ管理</h2><div class="two"><button class="secondary" id="newDayBtn">今日のクエストをリセット</button><button class="danger" id="resetBtn">全データをリセット</button></div></section></div></div>
  </section>
</main>
<dialog id="pinDialog"><h2>保護者PIN</h2><p>保護者画面を開くための4桁を入力してください。</p><div class="field"><label for="pinCheck">PIN</label><input id="pinCheck" type="password" inputmode="numeric" maxlength="4"></div><div class="dialog-actions"><button class="secondary" id="pinCancel">キャンセル</button><button class="primary" id="pinOk">開く</button></div></dialog>
<div class="toast" id="toast" role="status" aria-live="polite"></div><div class="confetti" id="confetti" aria-hidden="true"></div>
<script>
(()=>{'use strict';
const KEY='summerquest-v1';
const ITEMS={sword:{name:'銀のつるぎ',img:'item-sword.webp',power:1},wand:{name:'星のつえ',img:'item-wand.webp',power:1},shield:{name:'勇者のたて',img:'item-shield.webp',power:1},key:{name:'黄金のカギ',img:'item-key.webp',power:1},potion:{name:'赤いポーション',img:'item-potion.webp',power:1}};
const MONSTERS=[['ぷるぷるスライム','monster-slime.webp'],['森のゴブリン','monster-goblin.webp'],['黒きウルフ','monster-wolf.webp'],['岩石ゴーレム','monster-golem.webp'],['氷のドラゴン','monster-dragon.webp']];
const base={profile:{name:'ぼうけんしゃ',pin:''},works:[],quests:[],inventory:{sword:0,wand:0,shield:0,key:0,potion:0},battle:{hp:1,maxHp:1,monster:0,won:false},stats:{done:0,kills:0,chests:0},day:new Date().toISOString().slice(0,10)};
let state=load();let pendingMode=false;
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));return s?{...structuredClone(base),...s,profile:{...base.profile,...s.profile},inventory:{...base.inventory,...s.inventory},battle:{...base.battle,...s.battle},stats:{...base.stats,...s.stats}}:structuredClone(base)}catch{return structuredClone(base)}}
function save(){localStorage.setItem(KEY,JSON.stringify(state))}
const $=s=>document.querySelector(s);const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),2400)}
function allQuests(){return [...state.works.filter(w=>w.completed<w.total||w.doneToday).map(w=>({id:w.id,title:w.name+'を '+Math.min(w.daily,Math.max(0,w.total-w.completed+(w.doneToday?w.daily:0)))+'ページ',type:'work',reward:w.reward||'sword',done:w.doneToday,detail:`${w.completed} / ${w.total}ページ`})),...state.quests]}
function syncBattle(){const qs=allQuests();const max=Math.max(1,qs.length);if(state.battle.maxHp!==max&&!state.battle.won){const damage=Math.max(0,state.battle.maxHp-state.battle.hp);state.battle.maxHp=max;state.battle.hp=Math.max(1,max-damage)}}
function render(){syncBattle();const qs=allQuests(),done=qs.filter(q=>q.done).length,pct=qs.length?done/qs.length*100:0;$('#questBar').style.width=pct+'%';$('#questProgress').textContent=`${done} / ${qs.length}`;$('#doneStat').textContent=state.stats.done;$('#killStat').textContent=state.stats.kills;$('#chestStat').textContent=state.stats.chests;$('#stageBadge').textContent=`ステージ ${state.battle.monster+1}`;
const m=MONSTERS[state.battle.monster%MONSTERS.length];$('#enemyName').textContent=m[0];$('#enemyImg').src='assets/'+m[1];$('#hpBar').style.width=(state.battle.hp/state.battle.maxHp*100)+'%';$('#enemy').classList.toggle('defeated',state.battle.hp<=0);$('#chestImg').src='assets/'+(state.battle.won?'chest-gold.webp':'chest-locked.webp');$('#treasure').classList.toggle('won',state.battle.won);$('#chestLabel').textContent=state.battle.won?'黄金の宝箱をゲット！':'カギのかかった宝箱';
if(!qs.length)$('#battleMessage').textContent='保護者の人にクエストを登録してもらおう！';else if(state.battle.won)$('#battleMessage').textContent=`やったね、${state.profile.name}！すべてのクエストをクリアして黄金の宝箱を手に入れた！`;else if(state.battle.hp<=0&&done<qs.length)$('#battleMessage').textContent='モンスターを倒した！残りのクエストを全部クリアすると宝箱がひらくよ。';else $('#battleMessage').textContent='クエストを達成して、アイテムでモンスターを攻撃しよう！';
$('#nextHint').textContent=state.battle.won?'完全クリア！保護者画面で次の冒険を始められます。':done<qs.length?`あと ${qs.length-done} 個のクエストが残っているよ。`:state.battle.hp>0?'アイテムを使って敵にとどめをさそう！':'宝箱がひらくぞ…！';
$('#inventory').innerHTML=Object.entries(ITEMS).map(([id,x])=>`<div class="item"><img src="assets/${x.img}" alt="${x.name}"><span class="mini">${x.name}</span><strong>${state.inventory[id]||0}</strong></div>`).join('');
$('#kidQuestList').innerHTML=qs.length?qs.map(q=>`<article class="quest ${q.done?'done':''}"><div class="quest-icon">${q.type==='work'?'📘':q.type==='help'?'🧹':q.type==='study'?'✏️':q.type==='life'?'🌞':'⭐'}</div><div><h3>${esc(q.title)}</h3><p>${q.detail?esc(q.detail)+' ・ ':''}報酬：${ITEMS[q.reward].name}</p></div><button class="${q.done?'secondary':'primary'}" data-complete="${q.id}" ${q.done?'disabled':''}>${q.done?'✓ 達成済み':'できた！'}</button></article>`).join(''):'<div class="empty">クエストはまだありません。</div>';
$('#childName').value=state.profile.name;$('#pinInput').value=state.profile.pin;
const rows=[...state.works.map(w=>`<div class="work-card"><div class="work-head"><div><small>ワーク</small><h3>${esc(w.name)}</h3></div><button class="danger mini" data-delete-work="${w.id}">削除</button></div><p>${w.completed}/${w.total}ページ ・ 1日${w.daily}ページ</p><div class="bar"><i style="width:${Math.min(100,w.completed/w.total*100)}%;background:linear-gradient(90deg,#218ad4,#62d9ee)"></i></div></div>`),...state.quests.map(q=>`<div class="work-card"><div class="work-head"><div><small>任意クエスト</small><h3>${esc(q.title)}</h3></div><button class="danger mini" data-delete-quest="${q.id}">削除</button></div><p>報酬：${ITEMS[q.reward].name} ${q.done?'・達成済み':''}</p></div>`)];$('#parentList').innerHTML=rows.length?rows.join(''):'<div class="empty">登録はまだありません。</div>';save();
if(state.battle.hp<=0&&done===qs.length&&qs.length&&!state.battle.won){state.battle.won=true;state.stats.chests++;save();celebrate();setTimeout(render,50)}}
function switchMode(mode){$('#kidView').classList.toggle('active',mode==='kid');$('#parentView').classList.toggle('active',mode==='parent');$('#kidModeBtn').classList.toggle('active',mode==='kid');$('#parentModeBtn').classList.toggle('active',mode==='parent');$('#kidModeBtn').setAttribute('aria-pressed',mode==='kid');$('#parentModeBtn').setAttribute('aria-pressed',mode==='parent');window.scrollTo({top:0,behavior:'smooth'})}
$('#kidModeBtn').onclick=()=>switchMode('kid');$('#parentModeBtn').onclick=()=>{if(state.profile.pin){pendingMode=true;$('#pinCheck').value='';$('#pinDialog').showModal();$('#pinCheck').focus()}else switchMode('parent')};$('#pinCancel').onclick=()=>$('#pinDialog').close();$('#pinOk').onclick=()=>{if($('#pinCheck').value===state.profile.pin){$('#pinDialog').close();switchMode('parent')}else toast('PINが違います')};
$('#saveProfileBtn').onclick=()=>{const pin=$('#pinInput').value.trim();if(pin&&!/^\d{4}$/.test(pin))return toast('PINは4桁の数字にしてください');state.profile={name:$('#childName').value.trim()||'ぼうけんしゃ',pin};save();render();toast('設定を保存しました')};
$('#workForm').onsubmit=e=>{e.preventDefault();const total=+$ ('#totalPages').value,daily=+$ ('#dailyPages').value;state.works.push({id:crypto.randomUUID(),name:$('#workName').value.trim(),total,daily,completed:0,doneToday:false,reward:'sword'});resetBattle();e.target.reset();$('#totalPages').value=40;$('#dailyPages').value=5;render();toast('ワーククエストを追加しました')};
$('#questForm').onsubmit=e=>{e.preventDefault();state.quests.push({id:crypto.randomUUID(),title:$('#questTitle').value.trim(),type:$('#questType').value,reward:$('#reward').value,done:false});resetBattle();e.target.reset();render();toast('クエストを追加しました')};
document.addEventListener('click',e=>{const b=e.target.closest('[data-complete]');if(b)complete(b.dataset.complete);const dw=e.target.closest('[data-delete-work]');if(dw){state.works=state.works.filter(x=>x.id!==dw.dataset.deleteWork);resetBattle();render()}const dq=e.target.closest('[data-delete-quest]');if(dq){state.quests=state.quests.filter(x=>x.id!==dq.dataset.deleteQuest);resetBattle();render()}});
function complete(id){const w=state.works.find(x=>x.id===id);let reward;if(w&&!w.doneToday){w.doneToday=true;w.completed=Math.min(w.total,w.completed+w.daily);reward=w.reward||'sword'}const q=state.quests.find(x=>x.id===id);if(q&&!q.done){q.done=true;reward=q.reward}if(reward){state.inventory[reward]++;state.stats.done++;save();render();toast(`${ITEMS[reward].name}を手に入れた！`)}}
$('#attackBtn').onclick=()=>{if(state.battle.hp<=0)return toast('モンスターはもう倒したよ！');const item=Object.keys(ITEMS).find(id=>state.inventory[id]>0);if(!item)return toast('まずクエストでアイテムを手に入れよう');state.inventory[item]--;state.battle.hp=Math.max(0,state.battle.hp-ITEMS[item].power);$('#enemy').classList.add('hit');setTimeout(()=>$('#enemy').classList.remove('hit'),500);if(state.battle.hp===0){state.stats.kills++;toast('モンスターを倒した！')}else toast(`${ITEMS[item].name}で攻撃！`);save();render()};
function resetBattle(){state.battle={hp:Math.max(1,allQuests().length),maxHp:Math.max(1,allQuests().length),monster:state.battle.monster,won:false}}
$('#newDayBtn').onclick=()=>{state.works.forEach(w=>w.doneToday=false);state.quests.forEach(q=>q.done=false);state.inventory={sword:0,wand:0,shield:0,key:0,potion:0};state.battle.monster=(state.battle.monster+1)%MONSTERS.length;state.day=new Date().toISOString().slice(0,10);resetBattle();render();toast('新しい冒険を始めました')};
$('#resetBtn').onclick=()=>{if(confirm('登録したワークや冒険記録をすべて消しますか？')){state=structuredClone(base);save();render();switchMode('kid');toast('データをリセットしました')}};
function celebrate(){const c=$('#confetti');c.innerHTML='';for(let i=0;i<70;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.background=['#ffca28','#ef5350','#39b9ed','#67c96f','#a668d7'][i%5];p.style.setProperty('--drift',(Math.random()*220-110)+'px');p.style.animationDelay=Math.random()*.8+'s';c.append(p)}setTimeout(()=>c.innerHTML='',3900)}
if(state.day!==new Date().toISOString().slice(0,10)){state.works.forEach(w=>w.doneToday=false);state.quests.forEach(q=>q.done=false);state.day=new Date().toISOString().slice(0,10);resetBattle()}render();
})();
</script>
